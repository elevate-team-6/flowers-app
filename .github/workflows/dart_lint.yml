name: Quality Assurance (Lint & Test)

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

# Cancel old runs if a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Analyze, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📚 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter"

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🏗️ Run Code Generation (Optional)
        # Verify if generated code is consistent. 
        # If your project relies heavily on build_runner, uncomment the next line.
        # run: dart run build_runner build --delete-conflicting-outputs
        run: echo "Skipping build_runner for speed, enable if needed."

      - name: ✨ Check Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: 🔍 Run Analyzer
        run: flutter analyze

      - name: 🧪 Run Tests
        run: flutter test
