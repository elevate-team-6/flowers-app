name: flowers_app
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+5

environment:
  sdk: ^3.11.0

dependencies:
  bloc: ^9.2.0
  bot_toast: ^4.1.3
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.5.0
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  easy_localization: ^3.0.7
  equatable: ^2.0.8
  firebase_core: ^4.9.0
  firebase_crashlytics: ^5.2.3
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_map: ^8.3.0
  flutter_screenutil: ^5.9.0
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  flutter_native_splash: ^2.4.6
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  get_it: ^9.2.0
  google_fonts: ^8.0.2
  google_maps_flutter: ^2.17.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.2.2
  injectable: ^2.7.1
  json_annotation: ^4.9.0
  latlong2: ^0.9.1
  logger: ^2.6.0
  lottie: ^3.3.3
  path_provider: ^2.1.5
  pin_code_fields: ^8.0.1
