  webview_flutter: ^4.10.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.12.2

  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.9.1
  json_serializable: ^6.11.2
  mockito: ^5.6.4
  retrofit_generator: ^10.2.3
  test: ^1.29.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie_files/
    - assets/translations/
    - assets/json/

flutter_native_splash:
  color: "#FAFAFA"
  image: null
  android_12:
    color: "#FAFAFA"
    icon_background_color: "#FAFAFA"
    image: null


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/flowery_logo.png"
  adaptive_icon_background: "#FAFAFA"
  adaptive_icon_foreground: "assets/images/flowery_logo.png"
